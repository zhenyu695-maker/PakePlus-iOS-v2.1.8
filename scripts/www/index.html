<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>法考学习助手</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
  background: linear-gradient(135deg, #121A27 0%, #1F2A3F 100%);
  min-height: 100vh;
  padding: 16px;
  color: #fff;
}

.container {
  max-width: 480px;
  margin: 0 auto;
}

/*  iOS 毛玻璃玻璃卡片  */
.glass {
  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-radius: 22px;
  padding: 24px;
  margin-bottom: 18px;
  border: 1px solid rgba(255,255,255,0.12);
  box-shadow: 0 8px 32px rgba(0,0,0,0.2);
}

/* 标题 */
.h1 {
  font-size: 22px;
  font-weight: 700;
  color: #fff;
  margin-bottom: 6px;
}

.h2 {
  font-size: 18px;
  font-weight: 600;
  color: #fff;
  margin-bottom: 16px;
}

.sub {
  font-size: 14px;
  color: rgba(255,255,255,0.5);
}

/* 任务 */
.task-item {
  padding: 16px 0;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.task-item:last-child {
  border-bottom: none;
}
.task-title {
  font-size: 16px;
  color: #fff;
  font-weight: 500;
}
.task-desc {
  font-size: 13px;
  color: rgba(255,255,255,0.4);
  margin-top: 4px;
}

/* 圆形勾选 */
.check {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  border: 2px solid #4A90E2;
  float: right;
  margin-top: -30px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
}
.check.done {
  background: #4A90E2;
}

/* 统计面板 */
.stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
}
.stat-box {
  background: rgba(255,255,255,0.06);
  border-radius: 18px;
  padding: 20px 10px;
  text-align: center;
  border: 1px solid rgba(255,255,255,0.08);
}
.stat-num {
  font-size: 24px;
  font-weight: 700;
  color: #4A90E2;
}
.stat-label {
  font-size: 12px;
  color: rgba(255,255,255,0.4);
  margin-top: 4px;
}

/* 按钮 */
.btn {
  width: 100%;
  padding: 18px;
  border-radius: 16px;
  background: linear-gradient(90deg, #4A90E2, #357ABD);
  color: #fff;
  text-align: center;
  font-size: 17px;
  font-weight: 600;
  border: none;
  margin-top: 10px;
}
.btn.small {
  padding: 12px;
  font-size: 15px;
}
.btn.gray {
  background: rgba(255,255,255,0.1);
}
.btn:active {
  opacity: 0.9;
}

/* 进度条 */
.progress-item {
  margin-top: 12px;
}
.progress-label {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  color: rgba(255,255,255,0.7);
  margin-bottom: 6px;
}
.progress-bar {
  height: 8px;
  background: rgba(255,255,255,0.08);
  border-radius: 4px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #4A90E2, #6CC0F7);
  border-radius: 4px;
}

/* 计时器 */
.time-box {
  font-size: 36px;
  font-weight: 700;
  text-align: center;
  margin: 10px 0;
  color: #fff;
}

/* 标签栏 */
.tab {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
}
.tab-item {
  flex: 1;
  text-align: center;
  padding: 10px;
  border-radius: 14px;
  font-size: 14px;
  background: rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.6);
}
.tab-item.active {
  background: #4A90E2;
  color: #fff;
}

/* 页面 */
.page { display: none; }
.page.active { display: block; }

/* 日历 */
.calendar {
  display: grid;
  grid-template-columns: repeat(7,1fr);
  gap: 8px;
}
.cal-day {
  aspect-ratio: 1;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  background: rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.6);
}
.cal-day.done {
  background: #4A90E2;
  color: #fff;
}

/* 输入框 */
.input {
  width: 100%;
  padding: 16px;
  border-radius: 14px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  color: #fff;
  font-size: 15px;
  margin-top: 10px;
}

/* 错题 */
.error-item {
  padding: 14px;
  background: rgba(255,255,255,0.05);
  border-radius: 12px;
  margin-top: 10px;
  font-size: 14px;
  color: rgba(255,255,255,0.8);
}
</style>
</head>
<body>

<div class="container">
  <div class="glass">
    <div class="h1">法考学习助手</div>
    <div class="sub" id="dateInfo">加载中…</div>
  </div>

  <div class="tab">
    <div class="tab-item active" onclick="go('task')">今日任务</div>
    <div class="tab-item" onclick="go('progress')">科目进度</div>
    <div class="tab-item" onclick="go('calendar')">学习日历</div>
    <div class="tab-item" onclick="go('wrong')">错题本</div>
  </div>

  <!-- 今日任务 -->
  <div id="task" class="page active">
    <div class="glass">
      <div class="h2">今日学习任务</div>
      <div id="taskBox"></div>
    </div>

    <div class="glass">
      <div class="h2">学习计时</div>
      <div class="time-box" id="timerText">00:00:00</div>
      <div style="display: flex; gap:10px;">
        <button class="btn small" style="flex:1" onclick="startTimer()">▶️ 开始</button>
        <button class="btn small gray" style="flex:1" onclick="pauseTimer()">⏸ 暂停</button>
        <button class="btn small gray" style="flex:1" onclick="resetTimer()">🔄 重置</button>
      </div>
    </div>

    <div class="stats">
      <div class="stat-box">
        <div class="stat-num" id="countDay">0</div>
        <div class="stat-label">已学天数</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="examDay">0</div>
        <div class="stat-label">距法考天数</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="wrongCount">0</div>
        <div class="stat-label">错题数量</div>
      </div>
    </div>

    <button class="btn" onclick="doneTask()">✅ 今日学习完成打卡</button>
    <button class="btn gray" onclick="setRemind()">🔔 每日学习提醒</button>
  </div>

  <!-- 进度 -->
  <div id="progress" class="page">
    <div class="glass">
      <div class="h2">科目学习进度</div>
      <div id="progressList"></div>
    </div>
  </div>

  <!-- 日历 -->
  <div id="calendar" class="page">
    <div class="glass">
      <div class="h2">学习日历 · 打卡记录</div>
      <div class="calendar" id="cal"></div>
    </div>
  </div>

  <!-- 错题本 -->
  <div id="wrong" class="page">
    <div class="glass">
      <div class="h2">错题本</div>
      <input type="text" class="input" placeholder="记录错题关键词…" id="wrongInput">
      <button class="btn" onclick="addWrong()">➕ 添加错题</button>
      <div id="wrongList" style="margin-top:16px"></div>
    </div>
  </div>
</div>

<script>
const TASK = [
  { text: "刑法：犯罪构成 45min｜民法：民事法律关系 45min", progress: {刑法:5,民法:5} },
  { text: "刑法：故意、过失｜民法：自然人、权利能力", progress: {刑法:5,民法:5} },
  { text: "刑法：正当防卫、紧急避险｜民法：法人、非法人组织", progress: {刑法:5,民法:5} },
  { text: "刑法：共同犯罪｜民法：民事法律行为", progress: {刑法:5,民法:5} },
  { text: "刑法：罪数、未遂、中止｜民法：代理", progress: {刑法:5,民法:5} },
  { text: "民诉：管辖、当事人｜行政法：行政主体", progress: {民诉:5,行政法:5} },
  { text: "本周复盘 + 错题整理 + 真题", progress: {} },
  { text: "刑法：刑罚论｜民法：物权、占有", progress: {刑法:5,民法:5} },
  { text: "刑法：常见罪名｜民法：所有权、用益物权", progress: {刑法:5,民法:5} },
  { text: "民诉：证据、举证责任｜行政法：行政行为", progress: {民诉:5,行政法:5} },
  { text: "民法：担保物权｜商经：公司法基础", progress: {民法:5,商经:5} },
  { text: "刑诉：管辖、回避、辩护｜理论法：法理学基础", progress: {刑诉:5,理论法:5} },
  { text: "行政法：许可、处罚、强制｜三国法：国际法基础", progress: {行政法:5,三国法:5} },
  { text: "两周复盘 + 错题回顾 + 真题训练", progress: {} }
];

function getRecord(){let d=localStorage.getItem("law_record");return d?JSON.parse(d):{}}
function getWrongs(){let w=localStorage.getItem("law_wrong");return w?JSON.parse(w):[]}
function getProgress(){let p=localStorage.getItem("law_progress");return p?JSON.parse(p):{民法:0,刑法:0,民诉:0,刑诉:0,行政法:0,商经:0,理论法:0,三国法:0}}
function today(){return new Date().toDateString()}
function isDone(){return!!getRecord()[today()]}

function setDone(){
  let r=getRecord();
  if(!r[today()]){
    r[today()]=true;
    localStorage.setItem("law_record",JSON.stringify(r));
    addProgress();
  }
}

function addProgress(){
  let idx=dayIdx();
  let add=TASK[idx].progress;
  let p=getProgress();
  for(let k in add) p[k]=Math.min(100,p[k]+add[k]);
  localStorage.setItem("law_progress",JSON.stringify(p));
}

function countDone(){return Object.values(getRecord()).filter(Boolean).length}
function examLeft(){let e=new Date(2026,8,1);let n=new Date();return Math.ceil((e-n)/(1000*60*60*24))}
function dayIdx(){let s=new Date(2026,2,14);let n=new Date();let d=Math.floor((n-s)/(1000*60*60*24));return Math.max(0,d%14)}

function doneTask(){setDone();render()}

function addWrong(){
  let v=document.getElementById("wrongInput").value.trim();
  if(!v)return;
  let w=getWrongs();w.unshift(v);
  localStorage.setItem("law_wrong",JSON.stringify(w));
  document.getElementById("wrongInput").value="";
  render();
}

function render(){
  let idx=dayIdx();
  document.getElementById("dateInfo").innerText=`第${idx+1}天｜每日1.5小时`;
  let t=TASK[idx].text.split("｜");
  document.getElementById("taskBox").innerHTML=`
    <div class="task-item">
      <div class="task-title">${t[0]}</div>
      <div class="task-desc">${t[1]||""}</div>
      <div class="check ${isDone()?"done":""}">${isDone()?"✓":""}</div>
    </div>`;

  document.getElementById("countDay").innerText=countDone();
  document.getElementById("examDay").innerText=Math.max(0,examLeft());
  document.getElementById("wrongCount").innerText=getWrongs().length;

  let p=getProgress();
  let html="";
  for(let k in p){
    html+=`
    <div class="progress-item">
      <div class="progress-label">
        <span>${k}</span>
        <span>${p[k]}%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width:${p[k]}%"></div>
      </div>
    </div>`;
  }
  document.getElementById("progressList").innerHTML=html;

  let cal="";
  for(let i=0;i<35;i++){
    let d=new Date();d.setDate(d.getDate()-i);
    cal+=`<div class="cal-day ${getRecord()[d.toDateString()]?"done":""}">${d.getDate()}</div>`;
  }
  document.getElementById("cal").innerHTML=cal;

  let wl="";
  getWrongs.forEach((x,i)=>{wl+=`<div class="error-item">${i+1}. ${x}</div>`});
  document.getElementById("wrongList").innerHTML=wl;
}

function go(p){
  document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
  document.querySelectorAll(".tab-item").forEach(x=>x.classList.remove("active"));
  document.getElementById(p).classList.add("active");
  event.target.classList.add("active");
}

// 计时器
let timer=null, sec=0;
function fmt(s){let h=String(Math.floor(s/3600)).padStart(2,"0");let m=String(Math.floor((s%3600)/60)).padStart(2,"0");let sc=String(s%60).padStart(2,"0");return `${h}:${m}:${sc}`}
function update(){document.getElementById("timerText").innerText=fmt(sec)}
function startTimer(){if(timer)return;timer=setInterval(()=>{sec++;update()},1000)}
function pauseTimer(){clearInterval(timer);timer=null}
function resetTimer(){pauseTimer();sec=0;update()}

// 提醒
function setRemind(){
  if(!Notification) return alert("不支持通知");
  Notification.requestPermission(p=>{if(p==="granted")alert("通知权限已开启")});
}

render();
</script>
</body>
</html>
